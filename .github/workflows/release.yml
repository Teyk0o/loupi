# =============================================================================
# Loupi — Release workflow
# Triggered on push of a version tag (v*).
# Builds multi-arch Docker image, pushes to GHCR, and creates a GitHub Release.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
      - "*-rc*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      attestations: write
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Docker setup
      # -----------------------------------------------------------------------
      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Metadata
      # -----------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Loupi
            org.opencontainers.image.description=Free, open-source food & digestive symptom tracker
            org.opencontainers.image.url=https://loupi.app
            org.opencontainers.image.source=https://github.com/Teyk0o/loupi
            org.opencontainers.image.licenses=Apache-2.0

      # -----------------------------------------------------------------------
      # Build & Push
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Attestation (supply chain security)
      # -----------------------------------------------------------------------
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Release notes generation
      # -----------------------------------------------------------------------
      - name: Generate changelog and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Collect commits grouped by type
          FEAT=""
          FIX=""
          DOCS=""
          CHORE=""
          OTHER=""

          while IFS= read -r line; do
            HASH=$(printf '%s' "$line" | cut -d' ' -f1)
            MSG=$(printf '%s' "$line" | cut -d' ' -f2-)
            SHORT_HASH="${HASH:0:7}"

            case "$MSG" in
              feat*)  FEAT=$(printf '%s\n- %s (`%s`)' "$FEAT" "$MSG" "$SHORT_HASH") ;;
              fix*)   FIX=$(printf '%s\n- %s (`%s`)' "$FIX" "$MSG" "$SHORT_HASH") ;;
              docs*)  DOCS=$(printf '%s\n- %s (`%s`)' "$DOCS" "$MSG" "$SHORT_HASH") ;;
              chore*|ci*|style*|refactor*|perf*|test*)
                      CHORE=$(printf '%s\n- %s (`%s`)' "$CHORE" "$MSG" "$SHORT_HASH") ;;
              *)      OTHER=$(printf '%s\n- %s (`%s`)' "$OTHER" "$MSG" "$SHORT_HASH") ;;
            esac
          done < <(git log --oneline "${PREV_TAG}..${TAG_NAME}" 2>/dev/null || git log --oneline)

          # Build release body
          {
            if [ -n "$FEAT" ]; then
              printf '## ✨ New Features\n%s\n\n' "$FEAT"
            fi
            if [ -n "$FIX" ]; then
              printf '## 🐛 Bug Fixes\n%s\n\n' "$FIX"
            fi
            if [ -n "$DOCS" ]; then
              printf '## 📚 Documentation\n%s\n\n' "$DOCS"
            fi
            if [ -n "$CHORE" ]; then
              printf '## 🔧 Maintenance\n%s\n\n' "$CHORE"
            fi
            if [ -n "$OTHER" ]; then
              printf '## 📦 Other\n%s\n\n' "$OTHER"
            fi

            printf '---\n\n'
            printf '## 🐳 Docker\n\n'
            printf '```bash\n'
            printf 'docker pull ghcr.io/teyk0o/loupi:%s\n' "$TAG_NAME"
            printf '```\n\n'
            printf '**Supported architectures:** `linux/amd64`, `linux/arm64`\n\n'
            printf 'See the [deployment guide](https://github.com/Teyk0o/loupi#getting-started) for setup instructions.\n\n'
            printf '**Full changelog:** [`%s...%s`](https://github.com/Teyk0o/loupi/compare/%s...%s)' "$PREV_TAG" "$TAG_NAME" "$PREV_TAG" "$TAG_NAME"
          } > /tmp/release_body.md

          # Create GitHub Release
          gh release create "$TAG_NAME" \
            --repo "$REPO" \
            --title "$TAG_NAME" \
            --notes-file /tmp/release_body.md \
            --latest
