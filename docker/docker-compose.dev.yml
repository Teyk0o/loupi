services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=loupi
      - POSTGRES_USER=loupi
      - POSTGRES_PASSWORD=loupi_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loupi -d loupi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - LOUPI_ENV=development
      - LOUPI_DB_HOST=db
      - LOUPI_DB_PORT=5432
      - LOUPI_DB_NAME=loupi
      - LOUPI_DB_USER=loupi
      - LOUPI_DB_PASSWORD=loupi_dev
      - LOUPI_REDIS_HOST=redis
      - LOUPI_REDIS_PORT=6379
      - LOUPI_JWT_SECRET=dev_jwt_secret_change_in_production
      - LOUPI_CORS_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
